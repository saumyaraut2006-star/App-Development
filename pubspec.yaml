name: smart_interest_x
description: A loan and interest management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Export
  csv: ^6.0.0
  path_provider: ^2.1.4
  share_plus: ^10.0.3

  # UI
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true